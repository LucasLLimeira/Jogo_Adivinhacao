<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquímetro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <main>
        <article>
            <h1>Parquímetro</h1>
            <h3>Bem-vindo ao Parquímetro Virtual!</h3>
            <h3>Insira o valor que deseja recarregar:</h3>
        </article>

        <section>
            <article id="tabela">
            <h2>Tabela de Preços</h2>
            <p>R$ 1,00 - 30 minutos</p>
            <p>R$ 1,75 - 60 minutos</p>
            <p>R$ 3,00 - 120 minutos</p>
            </article>

            <article>
                <h2>Digite o valor de recarga:</h2>
                <input type="text" placeholder="Ex: 1,00" id="valor">
                <button onclick="calcularTempo()">Calcular</button>
                <p id="tempo"></p>
                <p id="troco"></p>
            </article>
        </section>
    </main>
</body>
</html>
